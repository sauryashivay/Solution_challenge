<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analysis App</title>

    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>

<body>
    <div class="home-btn-container">
        <a href="/" class="home-btn">⬅ Home</a>
    </div>

    <div class="container">

    
        <header>
            <h1>Risk Prediction System</h1>
        </header>

        <div class="glass-card">

            
            <form id="riskForm">
                <p class="section-label">Applicant information</p>

                <div class="input-grid">

                    <div class="field">
                        <label>Age (Must be ≥ 18)</label>
                        <input type="number" name="Age" min="18" required>
                    </div>

                    <div class="field">
                        <label>Sex</label>
                        <select name="Sex" required>
                            <option value="" disabled selected>Select sex</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Job level (0–3)</label>
                        <input type="number" name="Job" min="0" max="3" required>
                    </div>

                    <div class="field">
                        <label>Housing</label>
                        <select name="Housing" required>
                            <option value="" disabled selected>Select housing</option>
                            <option value="own">own</option>
                            <option value="rent">rent</option>
                            <option value="free">free</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Saving accounts</label>
                        <select name="Saving accounts" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="little">little</option>
                            <option value="moderate">moderate</option>
                            <option value="rich">rich</option>
                            <option value="quite rich">quite rich</option>
                            <option value="unknown">unknown</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Checking account</label>
                        <select name="Checking account" required>
                            <option value="" disabled selected>Select category</option>
                            <option value="little">little</option>
                            <option value="moderate">moderate</option>
                            <option value="rich">rich</option>
                            <option value="unknown">unknown</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Credit amount</label>
                        <input type="number" name="Credit amount" min="100" required>
                    </div>

                    <div class="field">
                        <label>Duration (months)</label>
                        <input type="number" name="Duration" min="1" required>
                    </div>

                    <div class="field">
                        <label>Purpose</label>
                        <select name="Purpose" required>
                            <option value="" disabled selected>Select purpose</option>
                            <option value="radio/TV">radio/TV</option>
                            <option value="education">education</option>
                            <option value="furniture/equipment">furniture/equipment</option>
                            <option value="car">car</option>
                            <option value="business">business</option>
                            <option value="domestic appliances">domestic appliances</option>
                            <option value="repairs">repairs</option>
                            <option value="vacation/others">vacation/others</option>
                        </select>
                    </div>

                </div>

                <div class="divider"></div>
                <button type="submit" class="predict-btn">Analyze Risk</button>
            </form>

            <div class="results-container">
            
                <div class="result-card">
                    <h3>Result</h3>
            
                    <div class="output-box">
            
                        <span id="riskBadge" class="risk-badge neutral">
                            Awaiting analysis...
                        </span>
            
                        <div id="llmResult" style="margin-top: 12px; color: #ccc;">
                            Awaiting analysis...
                        </div>
            
                    </div>
                </div>     
             </div>

        </div>
    </div>

    <script>
        document.getElementById('riskForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const rawData = Object.fromEntries(formData.entries());

            const formattedData = {
                ...rawData,
                "Age": parseInt(rawData["Age"]),
                "Job": parseInt(rawData["Job"]),
                "Credit amount": parseInt(rawData["Credit amount"]),
                "Duration": parseInt(rawData["Duration"])
            };

            const badge = document.getElementById('riskBadge');
            const llmBox = document.getElementById('llmResult');

            badge.innerText = "Processing...";
            badge.className = "risk-badge neutral";
            llmBox.innerText = "Analyzing...";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formattedData)
                });

                const result = await response.json();

                if (result.status === 'success') {

                    badge.innerText = result.ml_output;

                    if (result.risk_class === 'high') {
                        badge.className = "risk-badge high";
                    } else {
                        badge.className = "risk-badge low";
                    }

                    llmBox.innerText = result.llm_output;

                } else {
                    badge.innerText = "Error";
                    llmBox.innerText = result.message;
                }

            } catch (error) {
                alert("Failed to connect: " + error);
            }
        };
    </script>

    <script>
        window.addEventListener("pageshow", () => {
            const form = document.getElementById("riskForm");
            const badge = document.getElementById("riskBadge");
            const llmBox = document.getElementById("llmResult");

            form.reset();

            badge.innerText = "Awaiting analysis...";
            badge.className = "risk-badge neutral";

            llmBox.innerText = "Awaiting analysis...";
        });
    </script>

</body>

</html>
